<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chahat Organic – Articles</title>

<!-- ✅ SEO -->
<meta name="description" content="Read daily organic food articles by Chahat Organic. Learn benefits of pure, natural & chemical-free products directly from farmers.">
<meta name="keywords" content="organic food, organic turmeric, chemical free food, chahat organic, shubham mishra">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ✅ SOCIAL PREVIEW -->
<meta property="og:title" content="Chahat Organic – Daily Organic Articles">
<meta property="og:description" content="Pure • Natural • Direct From Farmers">
<meta property="og:type" content="website">

<style>
:root{
  --green:#1b5e20;
  --light:#f4f7f4;
  --card:#ffffff;
  --text:#222;
  --grey:#777;
}

/* DARK MODE */
body.dark{
  --light:#121212;
  --card:#1e1e1e;
  --text:#e0e0e0;
}

body{
  margin:0;
  font-family:"Segoe UI",Arial,sans-serif;
  background:var(--light);
  color:var(--text);
}

/* HEADER */
header{
  background:linear-gradient(135deg,#1b5e20,#2e7d32);
  color:#fff;
  padding:28px 20px;
  text-align:center;
  position:relative;
}
.toggle{
  position:absolute;
  top:20px;
  right:20px;
  background:#fff;
  border:none;
  border-radius:20px;
  padding:6px 12px;
  cursor:pointer;
}

/* SEARCH */
.search-box{
  max-width:900px;
  margin:20px auto;
  padding:0 20px;
}
.search-box input{
  width:100%;
  padding:12px 16px;
  border-radius:999px;
  border:1px solid #ccc;
}

/* CTA */
.cta{
  max-width:900px;
  margin:20px auto;
  background:#e8f5e9;
  color:#1b5e20;
  padding:14px 20px;
  border-radius:14px;
  text-align:center;
  font-weight:600;
}

/* ARTICLE */
.article{
  background:var(--card);
  margin:25px auto;
  max-width:900px;
  border-radius:16px;
  padding:25px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}
.article h2{color:var(--green);margin-top:0}

.meta{
  font-size:14px;
  color:var(--grey);
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.badge{
  background:#e8f5e9;
  color:#1b5e20;
  padding:3px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
}

.tags span{
  background:#f1f1f1;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  margin-right:6px;
}

/* CONTENT */
.article-content{
  font-size:17px;
  line-height:1.8;
}
.article-content img{
  max-width:100%;
  border-radius:10px;
  margin:12px 0;
  loading:lazy; /* ✅ NEW */
}

/* ✅ AUTHOR BOX */
.author{
  margin-top:25px;
  padding:15px;
  border-radius:12px;
  background:#f1f8f4;
  font-size:14px;
}

/* SOCIAL */
.social{
  margin-top:16px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.social button{
  border:none;
  padding:6px 14px;
  border-radius:999px;
  cursor:pointer;
}

/* PAGINATION */
.pagination{
  text-align:center;
  margin:30px;
}
.pagination button{
  margin:0 5px;
  padding:6px 14px;
  border:none;
  border-radius:999px;
  cursor:pointer;
}

/* FLOATING WHATSAPP */
.wa-float{
  position:fixed;
  right:18px;
  bottom:18px;
  background:#25D366;
  color:#fff;
  padding:14px 16px;
  border-radius:50%;
  font-size:22px;
  text-decoration:none;
  box-shadow:0 6px 20px rgba(0,0,0,.3);
}

/* ✅ SCROLL TOP */
#topBtn{
  position:fixed;
  left:18px;
  bottom:20px;
  padding:10px 14px;
  border:none;
  border-radius:50%;
  background:#1b5e20;
  color:#fff;
  display:none;
  cursor:pointer;
}

/* FOOTER */
footer{
  margin-top:60px;
  background:#0f2f17;
  color:#e0e0e0;
  padding:40px;
  text-align:center;
}
</style>
</head>

<body>

<header>
  <h1>Chahat Organic – Daily Articles</h1>
  <p>Pure • Natural • Direct From Farmers</p>
  <button class="toggle" onclick="toggleDark()">🌙 Dark</button>
</header>

<div class="search-box">
  <input id="search" placeholder="🔍 Search articles">
</div>

<div class="cta">
  🌿 Free organic tips ke liye WhatsApp par juden
</div>

<div id="articles"></div>
<div class="pagination" id="pager"></div>

<a class="wa-float" href="https://wa.me/917053053863" target="_blank">💬</a>
<button id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆</button>

<footer>
  © 2026 Chahat Organic • Founded & Managed by <b>Shubham Mishra</b>
</footer>

<script>
let page=1, perPage=3;

/* SCROLL TOP */
window.onscroll=()=>topBtn.style.display=scrollY>300?"block":"none";

function readingTime(html){
  let t=html.replace(/<[^>]+>/g,"");
  return Math.max(1,Math.ceil(t.split(/\s+/).length/200));
}

function autoTags(text){
  let w=[...new Set(text.toLowerCase().match(/\b[a-z]{5,}\b/g)||[])];
  return w.slice(0,4);
}

function addShare(i){
  let d=JSON.parse(localStorage.getItem("ARTICLES"));
  d[i].shares=(d[i].shares||0)+1;
  localStorage.setItem("ARTICLES",JSON.stringify(d));
  render();
}

function addView(i){
  let key = "viewed_"+i;
  if(sessionStorage.getItem(key)) return;
  let d=JSON.parse(localStorage.getItem("ARTICLES"));
  d[i].views=(d[i].views||0)+1;
  localStorage.setItem("ARTICLES",JSON.stringify(d));
  sessionStorage.setItem(key,"1");
}

function render(){
  let q=(search.value||"").toLowerCase();
  let data=JSON.parse(localStorage.getItem("ARTICLES")||"[]");
  let box=document.getElementById("articles");
  box.innerHTML="";

  let filtered=data.filter(a=>
    !q || a.title.toLowerCase().includes(q) || a.content.toLowerCase().includes(q)
  ).reverse();

  let total=Math.ceil(filtered.length/perPage);
  let start=(page-1)*perPage;

  filtered.slice(start,start+perPage).forEach((a,i)=>{
    let idx=data.length-1-(start+i);
    addView(idx);

    box.innerHTML+=`
    <div class="article">
      <h2>${a.title}</h2>

      <div class="meta">
        <span>${a.date}</span>
        <span>⏱️ ${readingTime(a.content)} min</span>
        <span>👀 ${a.views||0}</span>
        <span>🔁 ${a.shares||0}</span>
      </div>

      <div class="article-content">${a.content}</div>

      <div class="author">
        ✍️ Written by <b>Shubham Mishra</b><br>
        Founder – Chahat Organic | Promoting Pure & Chemical-Free Food
      </div>
    </div>`;
  });

  pager.innerHTML="";
  for(let i=1;i<=total;i++){
    pager.innerHTML+=`<button onclick="page=${i};render()">${i}</button>`;
  }
}

search.oninput=()=>{page=1;render()};
function toggleDark(){document.body.classList.toggle("dark")}
render();
</script>

</body>
</html>

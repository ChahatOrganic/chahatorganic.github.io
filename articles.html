<body>

<header>

<h2>Chahat Organic – Articles</h2>

<p>Pure • Honest • Farmer Sourced</p>

<div class="social">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDzdiSsRnH3NHbaqVT5PYEZHe7eqE6Gb0A",
authDomain:"chahatorganic-ca1a1.firebaseapp.com",
projectId:"chahatorganic-ca1a1",
storageBucket:"chahatorganic-ca1a1.firebasestorage.app",
messagingSenderId:"687378359578",
appId:"1:687378359578:web:94b28c0dff9431a9e4f8a3"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let ARTICLES=[];
let currentArticle=null;

const articlesContainer=document.getElementById("articles");
const searchInput=document.getElementById("search");

function getSlug(){
return new URLSearchParams(location.search).get("post");
}

function readingTime(html){
return Math.max(1,Math.ceil(html.replace(/<[^>]+>/g,"").split(/\s+/).length/200));
}

function addArticleSchema(a){
document.getElementById("articleSchema").textContent=JSON.stringify({
"@context":"https://schema.org",
"@type":"Article",
"headline":a.title,
"image":a.image,
"author":{"@type":"Person","name":"Shubham Mishra"},
"publisher":{"@type":"Organization","name":"Chahat Organic"},
"datePublished":a.date,
"description":a.excerpt
});
}

async function loadArticles(){

const snapshot=await getDocs(collection(db,"articles"));

snapshot.forEach(doc=>{
let data=doc.data();
data.id=doc.id;
ARTICLES.push(data);
});

document.getElementById("loading").style.display="none";

const slug=getSlug();

if(slug){
currentArticle=ARTICLES.findIndex(a=>a.slug===slug);
}

render();

}

loadArticles();

function render(){

articlesContainer.innerHTML="";

const q=(searchInput.value||"").toLowerCase();

if(currentArticle!==null){

const a=ARTICLES[currentArticle];

addArticleSchema(a);

articlesContainer.innerHTML=`

<article class="article">

<p><a href="articles.html">Articles</a> › ${a.title}</p>

<img src="${a.image}" loading="lazy">

<h2>${a.title}</h2>

<div class="meta">

${a.date} • ${readingTime(a.content)} min read

</div>

<div>${a.content}</div>

<a class="btn" href="articles.html">Back</a>

</article>

`;

return;

}

ARTICLES

.filter(a=>!q||a.title.toLowerCase().includes(q))

.forEach(a=>{

articlesContainer.innerHTML+=`

<article class="article article-card"

onclick="location.href='articles.html?post=${a.slug}'">

<img src="${a.image}" loading="lazy">

<h2>${a.title}</h2>

<div class="meta">${a.date}</div>

<p>${a.excerpt}</p>

</article>

`;

});

}

searchInput.oninput=render;

</script>

</body>
</html>

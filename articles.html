<script type="module">

/* ===============================
FIREBASE IMPORTS
================================ */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ===============================
FIREBASE CONFIG
================================ */

const firebaseConfig={
apiKey:"AIzaSyDzdiSsRnH3NHbaqVT5PYEZHe7eqE6Gb0A",
authDomain:"chahatorganic-ca1a1.firebaseapp.com",
projectId:"chahatorganic-ca1a1",
storageBucket:"chahatorganic-ca1a1.firebasestorage.app",
messagingSenderId:"687378359578",
appId:"1:687378359578:web:94b28c0dff9431a9e4f8a3"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* ===============================
GLOBAL VARIABLES
================================ */

let ARTICLES=[];
let currentArticle=null;
let activeCategory="all";

const articlesContainer=document.getElementById("articles");
const searchInput=document.getElementById("search");
const loading=document.getElementById("loading");

/* ===============================
HEADER NAVIGATION
================================ */

document.querySelector("header")?.insertAdjacentHTML(
"beforeend",
`
<nav class="main-nav sticky-nav">
<a href="index.html">Home</a>
<a href="articles.html">Articles</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="https://instagram.com/chahatorganic" target="_blank">Instagram</a>
</nav>
`
);

/* ===============================
FOOTER NAVIGATION
================================ */

document.querySelector("footer")?.insertAdjacentHTML(
"beforeend",
`
<p class="footer-nav">
<a href="index.html">Home</a> |
<a href="articles.html">Articles</a> |
<a href="about.html">About</a> |
<a href="contact.html">Contact</a> |
<a href="https://instagram.com/chahatorganic" target="_blank">Instagram</a>
</p>
`
);

/* ===============================
READING PROGRESS BAR
================================ */

const progressBar=document.createElement("div");
progressBar.style.cssText=
"position:fixed;top:0;left:0;height:4px;background:#1b5e20;width:0%;z-index:9999";
document.body.appendChild(progressBar);

window.addEventListener("scroll",()=>{

let progress=
(window.scrollY/(document.body.scrollHeight-window.innerHeight))*100;

progressBar.style.width=progress+"%";

});

/* ===============================
GET URL SLUG
================================ */

function getSlug(){
return new URLSearchParams(location.search).get("post");
}

/* ===============================
LOAD ARTICLES
================================ */

async function loadArticles(){

try{

const snapshot=await getDocs(collection(db,"articles"));

snapshot.forEach(docSnap=>{

let data=docSnap.data();
data.id=docSnap.id;

ARTICLES.push(data);

});

loading.style.display="none";

const slug=getSlug();

if(slug){
currentArticle=ARTICLES.findIndex(a=>a.slug===slug);
}

render();

}catch(err){

loading.innerText="⚠ Unable to load articles.";
console.error(err);

}

}

loadArticles();

/* ===============================
READING TIME
================================ */

function readingTime(html){

const words=html.replace(/<[^>]+>/g,"").split(/\s+/).length;
return Math.max(1,Math.ceil(words/200));

}

/* ===============================
XSS PROTECTION
================================ */

function cleanHTML(html){

return html
.replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi,"")
.replace(/on\w+="[^"]*"/g,"");

}

/* ===============================
VIEW COUNTER
================================ */

async function addView(article){

if(!article.id) return;

const key="view_"+article.id;

if(sessionStorage.getItem(key)) return;

sessionStorage.setItem(key,true);

await updateDoc(doc(db,"articles",article.id),{
views:increment(1)
});

}

/* ===============================
LIKE BUTTON
================================ */

window.likeArticle=async function(id){

await updateDoc(doc(db,"articles",id),{
likes:increment(1)
});

document.getElementById("likeBtn").innerText="❤️ Liked";

}

/* ===============================
BOOKMARK ARTICLE
================================ */

window.bookmarkArticle=function(){

localStorage.setItem("bookmark",location.href);
alert("Article bookmarked");

}

/* ===============================
COPY LINK
================================ */

window.copyLink=function(){

navigator.clipboard.writeText(location.href);
alert("Link copied");

}

/* ===============================
TRENDING ARTICLES
================================ */

function trending(){

return [...ARTICLES]
.sort((a,b)=>(b.views||0)-(a.views||0))
.slice(0,5);

}

/* ===============================
RELATED ARTICLES
================================ */

function related(category,slug){

return ARTICLES
.filter(a=>a.category===category && a.slug!==slug)
.slice(0,3);

}

/* ===============================
SEO META UPDATE
================================ */

function updateMeta(article){

document.title=article.title+" | Chahat Organic";

let desc=document.querySelector("meta[name='description']");
if(desc) desc.content=article.metaDesc||article.title;

let canonical=document.querySelector("link[rel='canonical']");
if(canonical) canonical.href=location.href;

}

/* ===============================
SCHEMA STRUCTURED DATA
================================ */

function schema(article){

const data={
"@context":"https://schema.org",
"@type":"Article",
"headline":article.title,
"author":{"@type":"Person","name":"Shubham Mishra"},
"publisher":{"@type":"Organization","name":"Chahat Organic"},
"datePublished":article.date
};

document.getElementById("articleSchema").textContent=
JSON.stringify(data);

}

/* ===============================
SOCIAL SHARE
================================ */

function shareButtons(url,title){

return `
<div class="share">
<a href="https://wa.me/?text=${title}%20${url}" target="_blank">WhatsApp</a>
<a href="https://twitter.com/intent/tweet?text=${title}&url=${url}" target="_blank">Twitter</a>
<a href="https://www.facebook.com/sharer/sharer.php?u=${url}" target="_blank">Facebook</a>
<a href="https://www.linkedin.com/sharing/share-offsite/?url=${url}" target="_blank">LinkedIn</a>
<a href="https://t.me/share/url?url=${url}&text=${title}" target="_blank">Telegram</a>
</div>
`;

}

/* ===============================
TABLE OF CONTENTS
================================ */

function generateTOC(){

let toc="<div class='toc'><b>Table of Contents</b><ul>";

document.querySelectorAll(".article-content h2").forEach(h=>{

let id=h.innerText.replace(/\s+/g,"-").toLowerCase();
h.id=id;

toc+=`<li><a href="#${id}">${h.innerText}</a></li>`;

});

toc+="</ul></div>";

return toc;

}

/* ===============================
PRINT
================================ */

window.printArticle=function(){
window.print();
};

/* ===============================
DARK MODE
================================ */

window.toggleDark=function(){
document.body.classList.toggle("dark");
};

/* ===============================
FONT SIZE
================================ */

window.toggleFont=function(){
document.body.classList.toggle("large-font");
};

/* ===============================
RENDER PAGE
================================ */

function render(){

articlesContainer.innerHTML="";

const query=(searchInput?.value||"").toLowerCase();

/* SINGLE ARTICLE */

if(currentArticle!==null && ARTICLES[currentArticle]){

const a=ARTICLES[currentArticle];

addView(a);
schema(a);
updateMeta(a);

const rel=related(a.category,a.slug);
const url=location.href;

articlesContainer.innerHTML=`

<article class="article">

<p>
<a href="index.html">Home</a> › 
<a href="articles.html">Articles</a> › 
${a.title}
</p>

<h1>${a.title}</h1>

<div class="meta">
${a.date} • ⏱ ${readingTime(a.content)} min read • 👁 ${a.views||0}
</div>

<button onclick="printArticle()">Print</button>
<button onclick="copyLink()">Copy Link</button>
<button onclick="bookmarkArticle()">Bookmark</button>
<button onclick="toggleFont()">Font +</button>

${generateTOC()}

<div class="article-content">
${cleanHTML(a.content)}
</div>

<button id="likeBtn" onclick="likeArticle('${a.id}')">
❤️ Like (${a.likes||0})
</button>

${shareButtons(url,a.title)}

<div class="author-box">
<strong>Author</strong><br>
Shubham Mishra — Founder, Chahat Organic
</div>

<h3>Related Articles</h3>

${rel.map(r=>`
<div class="article-card"
onclick="location.href='articles.html?post=${r.slug}'">
<h4>${r.title}</h4>
</div>
`).join("")}

</article>
`;

return;

}

/* LIST PAGE */

const filtered=ARTICLES.filter(a=>
(activeCategory==="all"||a.category===activeCategory) &&
(!query||(a.title+a.content).toLowerCase().includes(query))
);

/* TRENDING */

const t=trending();

articlesContainer.innerHTML+=`

<div class="trending">

<h3>🔥 Trending Articles</h3>

${t.map(a=>`
<p><a href="articles.html?post=${a.slug}">
${a.title}
</a></p>
`).join("")}

</div>
`;

/* ARTICLES GRID */

filtered.forEach(a=>{

articlesContainer.innerHTML+=`

<article class="article-card"

onclick="location.href='articles.html?post=${a.slug}'">

<h2>${a.title}</h2>

<div class="meta">
${a.date} • 👁 ${a.views||0}
</div>

</article>
`;

});

}

/* ===============================
SEARCH
================================ */

if(searchInput){
searchInput.oninput=render;
}

/* ===============================
CATEGORY FILTER
================================ */

window.setCategory=function(c){
activeCategory=c;
render();
};

/* ===============================
ERROR LOGGING
================================ */

window.onerror=function(msg,src,line){
console.error("Error:",msg,"Line:",line);
};

</script>

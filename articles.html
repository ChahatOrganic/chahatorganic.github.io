<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chahat Organic – Articles</title>

<meta name="description" content="Read daily organic food articles by Chahat Organic. Pure, natural & chemical-free food directly from farmers.">
<meta name="keywords" content="organic food, organic spices, haldi, chai, chahat organic, shubham mishra">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta property="og:title" content="Chahat Organic – Daily Organic Articles">
<meta property="og:description" content="Pure • Natural • Direct From Farmers">
<meta property="og:type" content="website">
<meta property="og:image" content="Chahat Logo.png">

<style>
:root{
  --green:#1b5e20;
  --light:#f4f7f4;
  --card:#ffffff;
  --text:#222;
  --grey:#777;
}
body.dark{
  --light:#121212;
  --card:#1e1e1e;
  --text:#e0e0e0;
}
body{
  margin:0;
  font-family:Segoe UI,Arial,sans-serif;
  background:var(--light);
  color:var(--text);
}

/* HEADER */
header{
  background:linear-gradient(135deg,#1b5e20,#2e7d32);
  color:#fff;
  padding:30px 20px;
  text-align:center;
  position:relative;
}
header img{max-width:120px;margin-bottom:10px}
.toggle{
  position:absolute;top:20px;right:20px;
  border:none;border-radius:20px;
  padding:6px 12px;cursor:pointer;
}

/* SEARCH */
.search-box{max-width:900px;margin:20px auto;padding:0 20px}
.search-box input{
  width:100%;padding:12px 16px;
  border-radius:999px;border:1px solid #ccc;
}

/* CTA */
.cta{
  max-width:900px;margin:20px auto;
  background:#e8f5e9;color:#1b5e20;
  padding:14px;border-radius:14px;
  text-align:center;font-weight:600;
}

/* ARTICLE */
.article{
  background:var(--card);
  margin:22px auto;
  max-width:900px;
  border-radius:16px;
  padding:25px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}
.article h2{color:var(--green);margin-top:0}
.meta{font-size:14px;color:var(--grey);display:flex;gap:12px;flex-wrap:wrap}

.article-content{font-size:17px;line-height:1.8}
.article-content img{max-width:100%;border-radius:10px;margin:12px 0}

/* ACTIONS */
.actions{
  margin-top:18px;
}
.actions button,
.buy-btn{
  margin-right:10px;
  padding:8px 18px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  font-weight:600;
}
.buy-btn{
  background:#1b5e20;
  color:#fff;
  text-decoration:none;
  display:inline-block;
}
.buy-btn:hover{opacity:.9}

/* AUTHOR */
.author{
  margin-top:25px;
  padding:15px;
  border-radius:12px;
  background:#f1f8f4;
  font-size:14px;
}

/* FLOAT */
.wa-float{
  position:fixed;right:18px;bottom:18px;
  background:#25D366;color:#fff;
  padding:14px;border-radius:50%;
  text-decoration:none;font-size:22px;
}

/* FOOTER */
footer{
  margin-top:60px;
  background:#0f2f17;
  color:#e0e0e0;
  padding:40px;
  text-align:center;
}
footer img{max-width:90px;margin-bottom:10px}
</style>
</head>

<body>

<header>
  <img src="Chahat Logo.png" alt="Chahat Organic Logo">
  <h1>Chahat Organic – Articles</h1>
  <p>Pure • Natural • Direct From Farmers</p>
  <button class="toggle" onclick="toggleDark()">🌙 Dark</button>
</header>

<div class="search-box">
  <input id="search" placeholder="🔍 Search articles">
</div>

<div class="cta">
  🌿 Join our WhatsApp for free organic tips & updates
</div>

<div id="articles"></div>

<a class="wa-float" href="https://wa.me/917053053863" target="_blank">💬</a>

<footer>
  <img src="Chahat Logo.png" alt="Chahat Organic">
  © 2026 Chahat Organic <br>
  Founded & Managed by <b>Shubham Mishra</b>
</footer>

<script>
let currentArticle=null;
const BUY_URL = "https://your-main-website.com"; // 👈 CHANGE THIS

function readingTime(html){
  let t=html.replace(/<[^>]+>/g,"");
  return Math.max(1,Math.ceil(t.split(/\s+/).length/200));
}

function render(){
  let q=(search.value||"").toLowerCase();
  let data=JSON.parse(localStorage.getItem("ARTICLES")||"[]");
  let box=document.getElementById("articles");
  box.innerHTML="";

  /* SINGLE ARTICLE */
  if(currentArticle!==null){
    let a=data[currentArticle];
    a.views=(a.views||0)+1;
    localStorage.setItem("ARTICLES",JSON.stringify(data));

    box.innerHTML=`
      <div class="article">
        <h2>${a.title}</h2>
        <div class="meta">
          <span>${a.date}</span>
          <span>⏱ ${readingTime(a.content)} min</span>
          <span>👀 ${a.views}</span>
        </div>

        <div class="article-content">${a.content}</div>

        <div class="actions">
          <button onclick="like(${currentArticle})">❤️ Like (${a.likes||0})</button>
          <button onclick="share('${a.title}')">🔗 Share</button>
          <a class="buy-btn" href="${BUY_URL}" target="_blank">🛒 Buy This Product</a>
        </div>

        <div class="author">
          ✍️ <b>Shubham Mishra</b><br>
          Founder – Chahat Organic
        </div>

        <br>
        <button onclick="currentArticle=null;render()">⬅ Back</button>
      </div>`;
    return;
  }

  /* LIST VIEW */
  data.filter(a=>
    !q||a.title.toLowerCase().includes(q)
  ).reverse().forEach((a,i)=>{
    let real=data.length-1-i;
    box.innerHTML+=`
      <div class="article" onclick="openArticle(${real})">
        <h2>${a.title}</h2>
        <div class="meta">
          <span>${a.date}</span>
          <span>⏱ ${readingTime(a.content)} min read</span>
        </div>
      </div>`;
  });
}

function openArticle(i){currentArticle=i;render();}
function like(i){
  let d=JSON.parse(localStorage.getItem("ARTICLES"));
  d[i].likes=(d[i].likes||0)+1;
  localStorage.setItem("ARTICLES",JSON.stringify(d));
  render();
}
function share(title){
  if(navigator.share){
    navigator.share({title,text:"Chahat Organic Article",url:location.href});
  }else{
    window.open("https://wa.me/?text="+encodeURIComponent(title+" "+location.href));
  }
}
search.oninput=render;
function toggleDark(){document.body.classList.toggle("dark")}
render();
</script>

</body>
</html>

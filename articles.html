<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chahat Organic – Articles</title>

<meta name="description" content="Explore well-researched articles on organic food, spices, and healthy living by Chahat Organic.">
<meta name="keywords" content="organic food, organic spices, turmeric, tea, chemical free food, chahat organic">
<meta name="author" content="Shubham Mishra">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="canonical" href="https://shubhammishra0043.github.io/chahatorganic/articles.html">

<meta property="og:title" content="Chahat Organic – Organic Food Articles">
<meta property="og:description" content="Pure • Organic • Responsibly Sourced From Farmers">
<meta property="og:type" content="website">
<meta property="og:image" content="https://shubhammishra0043.github.io/chahatorganic/Chahat%20Logo.png">

<script type="application/ld+json">
{
  "@context":"https://schema.org",
  "@type":"Organization",
  "name":"Chahat Organic",
  "founder":"Shubham Mishra",
  "url":"https://shubhammishra0043.github.io/chahatorganic/",
  "logo":"https://shubhammishra0043.github.io/chahatorganic/Chahat%20Logo.png",
  "sameAs":["https://wa.me/917053053863"]
}
</script>

<script type="application/ld+json" id="articleSchema"></script>

<style>
:root{--green:#1b5e20;--light:#f4f7f4;--card:#fff;--text:#222;--grey:#777;}
body.dark{--light:#121212;--card:#1e1e1e;--text:#e0e0e0}
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--light);color:var(--text)}
#progress{position:fixed;top:0;left:0;height:4px;background:#2e7d32;width:0;z-index:999}
header{background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;padding:32px 20px;text-align:center;position:relative}
header img{max-width:120px;margin-bottom:10px}
.toggle{position:absolute;top:20px;right:20px;border:none;border-radius:20px;padding:6px 14px;cursor:pointer}
.search-box{max-width:900px;margin:20px auto;padding:0 20px;position:sticky;top:0;background:var(--light);z-index:5}
.search-box input{width:100%;padding:12px 16px;border-radius:999px;border:1px solid #ccc}
.article{background:var(--card);margin:22px auto;max-width:900px;border-radius:16px;padding:26px;box-shadow:0 10px 25px rgba(0,0,0,.08);cursor:pointer}
.article img{width:100%;border-radius:12px;margin-bottom:12px}
.meta{font-size:14px;color:var(--grey);display:flex;gap:12px;flex-wrap:wrap}
.article-content{font-size:17px;line-height:1.85}
.ad-box{background:#f1f8f4;border:2px dashed #1b5e20;padding:20px;border-radius:14px;text-align:center;margin:30px 0;font-size:14px}
.affiliate{background:#e8f5e9;padding:18px;border-radius:14px;margin-top:30px}
.visit-btn{display:inline-block;margin-top:14px;padding:12px 28px;background:#1b5e20;color:#fff;border-radius:999px;text-decoration:none;font-weight:700}
.disclosure{font-size:12px;color:#777;margin-top:20px}
.wa-float{position:fixed;right:18px;bottom:18px;background:#25D366;color:#fff;padding:14px;border-radius:50%;font-size:22px;text-decoration:none}
footer{margin-top:60px;background:#0f2f17;color:#e0e0e0;padding:40px;text-align:center;font-size:14px}
</style>
</head>

<body>

<div id="progress"></div>

<header>
  <img src="Chahat Logo.png" alt="Chahat Organic Logo">
  <h1>Chahat Organic – Articles</h1>
  <p>Pure • Organic • Responsibly Sourced From Farmers</p>
  <button class="toggle" onclick="toggleDark()">🌙 Dark</button>
</header>

<div class="search-box">
  <input id="search" placeholder="🔍 Search articles">
</div>

<div id="articles"></div>

<a class="wa-float" href="https://wa.me/917053053863">💬</a>

<footer>
  © 2026 Chahat Organic<br>
  Founded by <b>Shubham Mishra</b>
  <div class="disclosure">
    Disclosure: This website may display ads and contain affiliate links.
  </div>
</footer>

<script>
let currentArticle=null, ARTICLES=[];
const MAIN_SITE_URL="https://shubhammishra0043.github.io/chahatorganic/";

function readingTime(html){
  return Math.max(1,Math.ceil(html.replace(/<[^>]+>/g,"").split(/\s+/).length/200));
}

fetch("articles.json")
.then(r=>r.json())
.then(d=>{ARTICLES=d;render();})
.catch(()=>articles.innerHTML="<p style='text-align:center'>⚠️ Articles not available.</p>");

function injectSchema(a){
  articleSchema.innerHTML=JSON.stringify({
    "@context":"https://schema.org",
    "@type":"BlogPosting",
    "headline":a.title,
    "image":a.image,
    "author":{"@type":"Person","name":"Shubham Mishra"},
    "publisher":{"@type":"Organization","name":"Chahat Organic"},
    "datePublished":a.date,
    "mainEntityOfPage":{"@type":"WebPage","@id":MAIN_SITE_URL}
  });
}

function render(){
  let q=(search.value||"").toLowerCase();
  articles.innerHTML="";

  if(currentArticle!==null){
    let a=ARTICLES[currentArticle];
    injectSchema(a);

    document.querySelector("meta[name=description]")
    .setAttribute("content", a.excerpt || a.title);

    articles.innerHTML=`
    <article class="article">
      <h2>${a.title}</h2>
      <div class="meta">${a.date} • ⏱ ${readingTime(a.content)} min</div>

      <div class="ad-box">🔔 Google AdSense (After Approval)</div>

      <div class="article-content">${a.content}</div>

      <div class="affiliate">
        <b>🌿 Recommended Organic Product</b><br>
        ${a.affiliate || "Affiliate link coming soon"}
        <br>
        <a class="visit-btn" href="https://wa.me/917053053863">Buy via WhatsApp</a>
      </div>

      <div class="disclosure">
        As an affiliate, we may earn from qualifying purchases.
      </div>

      <br><button onclick="currentArticle=null;render()">⬅ Back to Articles</button>
    </article>`;
    return;
  }

  ARTICLES
  .filter(a=>!q || a.title.toLowerCase().includes(q) || a.content.toLowerCase().includes(q))
  .slice().reverse()
  .forEach((a,i)=>{
    articles.innerHTML+=`
    <article class="article" onclick="currentArticle=${ARTICLES.length-1-i};render()">
      <img src="${a.image}" alt="${a.title}" loading="lazy">
      <h2>${a.title}</h2>
      <div class="meta">${a.date}</div>
    </article>`;
  });
}

function toggleDark(){
  document.body.classList.toggle("dark");
  document.querySelector(".toggle").textContent =
  document.body.classList.contains("dark")?"☀ Light":"🌙 Dark";
}

search.oninput=render;
window.onscroll=()=>progress.style.width=(scrollY/(document.body.scrollHeight-innerHeight))*100+"%";
</script>

</body>
</html>

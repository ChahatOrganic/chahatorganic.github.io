<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Organic Articles & Health Insights | Chahat Organic</title>

<meta name="description" content="Read expert articles on organic food, healthy living and chemical-free nutrition by Chahat Organic. Learn why organic lifestyle matters.">

<meta name="keywords" content="organic food articles, organic lifestyle, chemical free food, healthy living, chahat organic">

<style>
body{
  margin:0;
  font-family: "Segoe UI", Arial, sans-serif;
  background:#f3f6f3;
  color:#333;
}

/* HEADER */
header{
  background:#0f3d2e;
  color:#fff;
  padding:22px;
  text-align:center;
}
header h1{
  margin:0;
  font-size:38px;
}
header p{
  margin-top:6px;
  opacity:.9;
}

/* PAGE CONTENT */
.container{
  padding:60px 8%;
}
.page-title{
  text-align:center;
  font-size:34px;
  color:#0f3d2e;
  margin-bottom:8px;
}
.subtitle{
  text-align:center;
  font-size:17px;
  color:#555;
  margin-bottom:40px;
}

/* ARTICLES GRID */
.articles{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:26px;
}
.article-card{
  background:#fff;
  border-radius:18px;
  box-shadow:0 6px 18px rgba(0,0,0,.12);
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}
.article-card:hover{
  transform:translateY(-6px);
}
.article-card img{
  width:100%;
  height:190px;
  object-fit:cover;
}
.article-content{
  padding:18px;
}
.article-content h3{
  margin:8px 0;
  color:#1b5e20;
}
.article-content p{
  font-size:14px;
  color:#666;
}
.date{
  font-size:13px;
  color:#888;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  justify-content:center;
  align-items:center;
  z-index:999;
}
.modal-box{
  background:#fff;
  width:92%;
  max-width:900px;
  padding:32px;
  border-radius:20px;
  max-height:90vh;
  overflow:auto;
}
.close{
  float:right;
  font-size:22px;
  cursor:pointer;
}
.modal-box img{
  width:100%;
  border-radius:14px;
  margin:15px 0;
}
.modal-box p{
  line-height:1.8;
  font-size:16px;
}

/* FOOTER */
footer{
  background:#111;
  color:#fff;
  text-align:center;
  padding:24px;
  margin-top:40px;
}
footer span{
  display:block;
  margin-top:6px;
  font-size:14px;
  opacity:.8;
}

@media(max-width:768px){
  header h1{font-size:30px}
}
</style>
</head>

<body>

<header>
  <h1>Chahat Organic</h1>
  <p>Pure • Natural • Farmer Sourced</p>
</header>

<div class="container">
  <h2 class="page-title">Organic Knowledge & Health Articles</h2>
  <p class="subtitle">
    Expert insights on organic food, healthy living and the impact of chemical-free nutrition.
  </p>

  <div class="articles" id="articleGrid"></div>
</div>

<!-- ARTICLE MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <span class="close" onclick="closeArticle()">✖</span>
    <h2 id="aTitle"></h2>
    <p class="date" id="aDate"></p>
    <img id="aImg">
    <div id="aContent"></div>
  </div>
</div>

<footer>
© 2026 Chahat Organic • Honest Food • Honest Living
<span>Managed & Founded by <b>Shubham Mishra</b></span>
</footer>

<script>
/* ARTICLE DATA – Add new articles here */
const articles=[
{
  title:"Why Organic Turmeric Is Essential for Daily Health",
  date:"19 September 2026",
  img:"haldi.jpg",
  content:`
  <p>
  Organic turmeric is rich in natural curcumin and free from artificial color
  and chemical polishing agents. Regular consumption supports immunity,
  digestion and joint health.
  </p>
  <p>
  In contrast, chemically processed turmeric may contain harmful residues
  that can negatively impact liver function and weaken long-term immunity.
  </p>
  `
},
{
  title:"Organic Tea vs Regular Tea – A Health Comparison",
  date:"18 September 2026",
  img:"tea.jpg",
  content:`
  <p>
  Organic tea is grown without synthetic pesticides and chemical fertilizers,
  making it safer for daily consumption. It supports heart health,
  mental alertness and digestion.
  </p>
  <p>
  Regular tea often contains chemical residues that may cause acidity,
  stomach discomfort and long-term health issues.
  </p>
  `
},
{
  title:"Why Choosing Organic Food Protects Your Family",
  date:"17 September 2026",
  img:"CH01.png",
  content:`
  <p>
  Organic food reduces exposure to toxic chemicals, making it safer
  for children, adults and elderly family members.
  </p>
  <p>
  Long-term consumption of chemical-based food is associated with
  lifestyle diseases, whereas organic nutrition promotes immunity,
  energy and overall well-being.
  </p>
  `
}
];

/* RENDER ARTICLES */
const grid=document.getElementById("articleGrid");
articles.forEach((a,i)=>{
  grid.innerHTML+=`
  <div class="article-card" onclick="openArticle(${i})">
    <img src="${a.img}">
    <div class="article-content">
      <div class="date">${a.date}</div>
      <h3>${a.title}</h3>
      <p>Click to read full article →</p>
    </div>
  </div>`;
});

function openArticle(i){
  const a=articles[i];
  aTitle.innerText=a.title;
  aDate.innerText=a.date;
  aImg.src=a.img;
  aContent.innerHTML=a.content;
  modal.style.display="flex";
}
function closeArticle(){
  modal.style.display="none";
}
</script>

</body>
</html>

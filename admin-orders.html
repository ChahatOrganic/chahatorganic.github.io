<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chahat Organic | Admin Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* THEME */
body{
font-family:Arial;
margin:0;
background:#f4f7f4;
transition:0.3s;
}

.dark{
background:#121212;
color:white;
}

/* LAYOUT */
.container{
display:flex;
min-height:100vh;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:#1b5e20;
color:white;
padding:20px;
}

.sidebar a{
display:block;
color:white;
margin:10px 0;
text-decoration:none;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* CARDS */
.summary{
display:flex;
flex-wrap:wrap;
}

.card{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
width:150px;
}

.dark .card{
background:#1f1f1f;
}

/* TABLE */
.table-wrap{overflow-x:auto;}
table{
width:100%;
background:white;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

.dark table{
background:#1f1f1f;
}

.paid{color:green;}
.pending{color:red;}

button{
padding:8px 15px;
background:#2e7d32;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin:5px;
}

</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🌿 Admin</h2>
<a href="#">Dashboard</a>
<a href="#">Orders</a>
<a href="#">Reports</a>
<a href="#">Settings</a>

<button onclick="toggleTheme()">🌙 Toggle Mode</button>
</div>

<!-- MAIN -->
<div class="main">

<h2>📊 Dashboard</h2>

<div class="summary">
<div class="card">Total<br><b id="total"></b></div>
<div class="card">Paid<br><b id="paid"></b></div>
<div class="card">Pending<br><b id="pending"></b></div>
<div class="card">Revenue<br><b id="revenue"></b></div>
</div>

<canvas id="chart" height="100"></canvas>

<input type="text" id="search" placeholder="Search..." onkeyup="filterOrders()">

<div class="table-wrap">
<table>
<thead>
<tr>
<th>ID</th>
<th>Product</th>
<th>Price</th>
<th>Name</th>
<th>Status</th>
</tr>
</thead>

<tbody id="ordersTable"></tbody>
</table>
</div>

</div>
</div>

<script>

/* THEME */
function toggleTheme(){
document.body.classList.toggle("dark");
}

/* DATA */
let orders = [];

/* SAMPLE (replace with API) */
orders = [
{orderId:"ORD1", product:"Honey", price:299, name:"Rahul", payment:"Paid"},
{orderId:"ORD2", product:"Amla", price:199, name:"Amit", payment:"Pending"}
];

/* DISPLAY */
function display(){
let html="";
orders.forEach(o=>{
html+=`
<tr>
<td>${o.orderId}</td>
<td>${o.product}</td>
<td>₹${o.price}</td>
<td>${o.name}</td>
<td class="${o.payment==="Paid"?"paid":"pending"}">${o.payment}</td>
</tr>
`;
});
document.getElementById("ordersTable").innerHTML=html;
}

/* SUMMARY */
function summary(){
let total=orders.length;
let paid=orders.filter(o=>o.payment==="Paid").length;
let pending=total-paid;

let revenue=orders.filter(o=>o.payment==="Paid")
.reduce((s,o)=>s+o.price,0);

document.getElementById("total").innerText=total;
document.getElementById("paid").innerText=paid;
document.getElementById("pending").innerText=pending;
document.getElementById("revenue").innerText="₹"+revenue;

/* CHART */
new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Paid","Pending"],
datasets:[{
data:[paid,pending]
}]
}
});
}

/* SEARCH */
function filterOrders(){
let q=document.getElementById("search").value.toLowerCase();

let filtered=orders.filter(o=>
o.name.toLowerCase().includes(q) ||
o.product.toLowerCase().includes(q)
);

orders=filtered;
display();
}

display();
summary();

</script>

</body>
</html>

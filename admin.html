<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chahat Organic – Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{--green:#1b5e20}
body{margin:0;font-family:Arial;background:#f4f7f4}
header{background:var(--green);color:#fff;padding:16px;text-align:center}

/* Login */
.login,.password-box{
  max-width:380px;margin:40px auto;background:#fff;
  padding:25px;border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.1)
}
.login h2,.password-box h3{text-align:center;color:var(--green)}
.login input,.password-box input{
  width:100%;padding:12px;margin-top:10px
}
.login button,.password-box button{
  width:100%;margin-top:15px;padding:12px;
  background:var(--green);color:#fff;border:none;border-radius:20px
}

/* Admin */
.box{
  display:none;
  max-width:1000px;margin:20px auto;background:#fff;
  padding:20px;border-radius:12px
}
input{width:100%;padding:12px;margin-bottom:10px;font-size:16px}

.editor{
  border:1px solid #ccc;
  min-height:220px;
  padding:12px;
  font-size:16px;
}

.toolbar button{
  margin-right:6px;
  padding:6px 12px;
  border-radius:6px;
  border:1px solid #ccc;
  background:#f5f5f5;
  cursor:pointer
}

.actions button{
  padding:10px 22px;background:var(--green);color:#fff;
  border:none;border-radius:20px;cursor:pointer
}

.msg{margin-top:10px;color:var(--green);font-weight:600}

/* Posts List */
.post{
  border-bottom:1px solid #ddd;
  padding:10px 0
}
.post b{color:#1b5e20}
.post button{
  margin-right:6px;
  padding:4px 10px;
  border:none;border-radius:12px;
  cursor:pointer
}
.edit{background:#e3f2fd}
.del{background:#fdecea}

footer{
  margin-top:40px;
  background:#0f2f17;color:#d5e3d5;
  text-align:center;padding:20px;font-size:14px
}
footer b{color:#fff}
</style>
</head>

<body>

<header>
  <h2>Chahat Organic – Admin Panel</h2>
  <p>Secure • Full Control • Working</p>
</header>

<!-- LOGIN -->
<div class="login" id="loginBox">
  <h2>Admin Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- CHANGE PASSWORD -->
<div class="password-box" id="passBox" style="display:none">
  <h3>🔐 Change Password</h3>
  <input id="oldPass" type="password" placeholder="Old Password">
  <input id="newPass" type="password" placeholder="New Password">
  <button onclick="changePassword()">Update Password</button>
</div>

<!-- ADMIN PANEL -->
<div class="box" id="adminBox">

<input id="title" placeholder="Article Title">

<!-- 🔴 placeholder text hata diya -->
<div id="editor" class="editor" contenteditable="true"></div>

<div class="toolbar">
  <button onclick="cmd('bold')"><b>B</b></button>
  <button onclick="cmd('italic')"><i>I</i></button>
  <button onclick="cmd('insertUnorderedList')">• List</button>
  <button onclick="addImage()">🖼️ Image</button>
</div>

<div class="actions">
  <button onclick="publish()">Publish / Update</button>
</div>

<div class="msg" id="statusMsg"></div>

<h3>🗂️ Existing Posts</h3>
<div id="postList"></div>

</div>

<footer>
  © 2026 <b>Chahat Organic</b><br>
  Founded & Managed by <b>Shubham Mishra</b>
</footer>

<script>
/* ===== AUTH ===== */
let ADMIN_USER="admin";
let ADMIN_PASS=localStorage.getItem("ADMIN_PASS") || "chahat@13";
let editIndex=null;

function login(){
  if(username.value===ADMIN_USER && password.value===ADMIN_PASS){
    loginBox.style.display="none";
    adminBox.style.display="block";
    passBox.style.display="block";
    sessionStorage.setItem("admin","1");
    renderPosts();
  }else alert("Invalid login");
}
if(sessionStorage.getItem("admin")==="1"){
  loginBox.style.display="none";
  adminBox.style.display="block";
  passBox.style.display="block";
  renderPosts();
}

/* ===== PASSWORD CHANGE ===== */
function changePassword(){
  if(oldPass.value!==ADMIN_PASS){
    alert("Old password incorrect"); return;
  }
  ADMIN_PASS=newPass.value;
  localStorage.setItem("ADMIN_PASS",newPass.value);
  alert("Password updated successfully ✅");
  oldPass.value=newPass.value="";
}

/* ===== EDITOR ===== */
function cmd(c){document.execCommand(c,false,null);}

/* IMAGE INSERT */
function addImage(){
  let i=document.createElement("input");
  i.type="file"; i.accept="image/*";
  i.onchange=()=>{
    let r=new FileReader();
    r.onload=e=>{
      document.execCommand(
        "insertHTML",
        false,
        `<img src="${e.target.result}" style="max-width:100%;border-radius:10px">`
      );
    };
    r.readAsDataURL(i.files[0]);
  };
  i.click();
}

/* ===== FINAL FIXED PUBLISH ===== */
function publish(){
  let t = title.value.trim();
  let c = editor.innerHTML.trim();

  if(!t || c==="" || c==="<br>"){
    alert("Title aur content dono likhna zaroori hai");
    return;
  }

  let data = JSON.parse(localStorage.getItem("ARTICLES") || "[]");

  let obj = {
    title: t,
    content: c,
    date: new Date().toLocaleString("en-IN",{dateStyle:"medium",timeStyle:"short"}),
    views: 0,
    shares: 0,
    likes: 0,
    tags: []
  };

  if(editIndex!==null){
    obj.views = data[editIndex].views || 0;
    obj.shares = data[editIndex].shares || 0;
    data[editIndex] = obj;
    editIndex = null;
    statusMsg.innerText="✏️ Post updated successfully";
  }else{
    data.push(obj);
    statusMsg.innerText="✅ Post published successfully";
  }

  localStorage.setItem("ARTICLES", JSON.stringify(data));

  title.value="";
  editor.innerHTML="";
  renderPosts();
}

function renderPosts(){
  let data=JSON.parse(localStorage.getItem("ARTICLES")||"[]");
  postList.innerHTML="";
  data.forEach((p,i)=>{
    postList.innerHTML+=`
      <div class="post">
        <b>${p.title}</b><br>
        <button class="edit" onclick="editPost(${i})">Edit</button>
        <button class="del" onclick="deletePost(${i})">Delete</button>
      </div>`;
  });
}

function editPost(i){
  let d=JSON.parse(localStorage.getItem("ARTICLES"));
  title.value=d[i].title;
  editor.innerHTML=d[i].content;
  editIndex=i;
}

function deletePost(i){
  if(confirm("Delete this post?")){
    let d=JSON.parse(localStorage.getItem("ARTICLES"));
    d.splice(i,1);
    localStorage.setItem("ARTICLES",JSON.stringify(d));
    renderPosts();
  }
}
</script>

</body>
</html>

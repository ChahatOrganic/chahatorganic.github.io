<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chahat Organic – Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
:root{--green:#1b5e20}
body{margin:0;font-family:Arial;background:#f4f7f4}
header{background:var(--green);color:#fff;padding:16px;text-align:center}

/* Login */
.login{
  max-width:380px;margin:80px auto;background:#fff;
  padding:25px;border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.1)
}
.login h2{text-align:center;color:var(--green)}
.login input{width:100%;padding:12px;margin-top:10px}
.login button{
  width:100%;margin-top:15px;padding:12px;
  background:var(--green);color:#fff;border:none;border-radius:20px
}

/* Admin */
.box{
  display:none;
  max-width:900px;margin:20px auto;background:#fff;
  padding:20px;border-radius:12px
}
input{width:100%;padding:12px;margin-bottom:10px;font-size:16px}

.editor{
  border:1px solid #ccc;
  min-height:220px;
  padding:12px;
  font-size:16px;
}

.toolbar{
  margin-top:10px;
}
.toolbar button{
  margin-right:6px;
  padding:6px 12px;
  border-radius:6px;
  border:1px solid #ccc;
  background:#f5f5f5;
  cursor:pointer;
}

.actions{margin-top:15px}
.actions button{
  padding:8px 18px;background:var(--green);color:#fff;
  border:none;border-radius:20px;margin-right:8px;cursor:pointer
}

.msg{
  margin-top:12px;
  color:var(--green);
  font-weight:600;
}

/* Footer */
footer{
  margin-top:40px;
  background:#0f2f17;
  color:#d5e3d5;
  text-align:center;
  padding:20px;
  font-size:14px;
}
footer b{color:#fff}
</style>
</head>

<body>

<header>
  <h2>Chahat Organic – Admin Panel</h2>
  <p>Secure • Simple • Professional</p>
</header>

<!-- LOGIN -->
<div class="login" id="loginBox">
  <h2>Admin Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div class="box" id="adminBox">

<input id="title" placeholder="Post Title / Subject">

<div id="editor" class="editor" contenteditable>
Write your content here (email-style editor)...
</div>

<!-- Toolbar BELOW editor (email-like) -->
<div class="toolbar">
  <button onclick="cmd('bold')"><b>B</b></button>
  <button onclick="cmd('italic')"><i>I</i></button>
  <button onclick="cmd('insertUnorderedList')">• List</button>
  <button onclick="addImage()">Image</button>
</div>

<input type="datetime-local" id="schedule">

<div class="actions">
  <button onclick="publishNow()">Publish</button>
  <button onclick="schedulePost()">Schedule</button>
</div>

<div class="msg" id="statusMsg"></div>

</div>

<footer>
  © 2026 <b>Chahat Organic</b><br>
  Founded & Managed by <b>Shubham Mishra</b><br>
  Contact: <b>shubhammishraa052@gmail.com</b>
</footer>

<script>
/* ===== LOGIN ===== */
const ADMIN_USER="admin";
const ADMIN_PASS="chahat@13";

function login(){
  if(username.value===ADMIN_USER && password.value===ADMIN_PASS){
    loginBox.style.display="none";
    adminBox.style.display="block";
    sessionStorage.setItem("admin","1");
  }else{
    alert("Invalid username or password");
  }
}
if(sessionStorage.getItem("admin")==="1"){
  loginBox.style.display="none";
  adminBox.style.display="block";
}

/* ===== FIREBASE (REPLACE WITH REAL VALUES) ===== */
firebase.initializeApp({
  apiKey: "PASTE_YOUR_REAL_API_KEY_HERE",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com"
});

const db = firebase.firestore();
const storage = firebase.storage();

/* ===== EDITOR ===== */
function cmd(c){ document.execCommand(c,false,null); }

/* ===== IMAGE UPLOAD ===== */
async function addImage(){
  try{
    let input=document.createElement("input");
    input.type="file";
    input.accept="image/*";
    input.onchange=async()=>{
      let file=input.files[0];
      let ref=storage.ref("posts/"+Date.now()+"_"+file.name);
      await ref.put(file);
      let url=await ref.getDownloadURL();
      document.execCommand(
        "insertHTML",
        false,
        `<img src="${url}" style="max-width:100%;margin:10px 0;border-radius:10px">`
      );
    };
    input.click();
  }catch(err){
    alert("Image upload failed: "+err.message);
  }
}

/* ===== PUBLISH ===== */
async function publishNow(){
  try{
    if(!title.value || !editor.innerHTML.trim()){
      alert("Title and content are required.");
      return;
    }
    await db.collection("posts").add({
      title: title.value,
      content: editor.innerHTML,
      publishTime: firebase.firestore.Timestamp.now()
    });
    statusMsg.innerText="✅ Post published successfully and is now live.";
    clearForm();
  }catch(err){
    alert("Firebase Error: " + err.message);
  }
}

/* ===== SCHEDULE ===== */
async function schedulePost(){
  try{
    if(!schedule.value){
      alert("Please select date & time.");
      return;
    }
    await db.collection("posts").add({
      title: title.value,
      content: editor.innerHTML,
      publishTime: firebase.firestore.Timestamp.fromDate(new Date(schedule.value))
    });
    statusMsg.innerText="⏰ Post scheduled successfully.";
    clearForm();
  }catch(err){
    alert("Firebase Error: " + err.message);
  }
}

function clearForm(){
  title.value="";
  editor.innerHTML="";
  schedule.value="";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Chahat Organic | Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f7f4;
margin:0;
}

header{
background:#1b5e20;
color:white;
padding:25px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.editor{
border:1px solid #ccc;
padding:15px;
min-height:220px;
border-radius:10px;
background:white;
margin-top:10px;
}

.toolbar{
margin-top:10px;
display:flex;
flex-wrap:wrap;
gap:6px;
}

.toolbar button{
padding:8px 12px;
border-radius:6px;
border:1px solid #ccc;
background:#f3f3f3;
cursor:pointer;
}

button{
padding:12px 25px;
background:#1b5e20;
color:white;
border:none;
border-radius:25px;
margin-top:15px;
cursor:pointer;
}

.preview{
background:#444;
}

.logout{
background:#b71c1c;
float:right;
}

.msg{
margin-top:15px;
font-weight:bold;
}

.previewBox{
background:white;
padding:20px;
border-radius:10px;
border:1px solid #ccc;
margin-top:20px;
display:none;
}

#loginBox{
max-width:400px;
margin:80px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.spinner{
border:3px solid #eee;
border-top:3px solid #1b5e20;
border-radius:50%;
width:18px;
height:18px;
display:inline-block;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.seoPreview{
background:white;
border:1px solid #ddd;
padding:15px;
margin-top:15px;
}

.seoPreview h3{
color:#1a0dab;
margin:0;
}

.seoPreview p{
color:#545454;
margin:4px 0;
}

</style>
</head>

<body>

<header>
<h2>Chahat Organic Admin Dashboard</h2>
</header>

<!-- LOGIN -->

<div id="loginBox">

<input id="email" placeholder="Admin Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="msg" id="loginMsg"></div>

</div>

<!-- ADMIN PANEL -->

<div class="container" id="adminPanel" style="display:none">

<button class="logout" onclick="logout()">Logout</button>

<input id="title" placeholder="Article Title (max 100 characters)">
<input id="metaTitle" placeholder="SEO Meta Title">
<textarea id="metaDesc" placeholder="SEO Meta Description"></textarea>

<input id="tags" placeholder="Tags (example: organic food, turmeric)">
<input id="imgAlt" placeholder="Image ALT text (SEO)">

<div class="toolbar">
<button onclick="format('bold')"><b>B</b></button>
<button onclick="format('italic')"><i>I</i></button>
<button onclick="format('insertUnorderedList')">• List</button>
<button onclick="addImage()">🖼 Image</button>
</div>

<div id="editor" class="editor" contenteditable="true">
<p><b>Start writing your article...</b></p>
</div>

<button class="preview" onclick="preview()">Preview</button>
<button id="publishBtn" onclick="publish()">Publish Article</button>

<div class="msg" id="statusMsg"></div>

<div id="previewBox" class="previewBox"></div>

<div class="seoPreview" id="seoPreview"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

/* FIREBASE CONFIG */

const firebaseConfig={
apiKey:"AIzaSyDzdiSsRnH3NHbaqVT5PYEZHe7eqE6Gb0A",
authDomain:"chahatorganic-ca1a1.firebaseapp.com",
projectId:"chahatorganic-ca1a1",
storageBucket:"chahatorganic-ca1a1.firebasestorage.app",
messagingSenderId:"687378359578",
appId:"1:687378359578:web:94b28c0dff9431a9e4f8a3"
};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);
const auth=getAuth(app);
const storage=getStorage(app);

/* AUTH CHECK */

onAuthStateChanged(auth,(user)=>{

if(user){
loginBox.style.display="none";
adminPanel.style.display="block";
}

});

/* LOGIN */

window.login=async function(){

let email=email.value;
let pass=password.value;

try{

await signInWithEmailAndPassword(auth,email,pass);

}catch(err){

loginMsg.innerText="❌ "+err.message;

}

}

/* LOGOUT */

window.logout=function(){

if(confirm("Logout from admin panel?")){

signOut(auth);
location.reload();

}

}

/* TEXT FORMAT */

window.format=function(cmd){
document.execCommand(cmd,false,null);
}

/* IMAGE UPLOAD */

window.addImage=function(){

let input=document.createElement("input");
input.type="file";
input.accept="image/*";

input.onchange=async()=>{

let file=input.files[0];

if(file.size>2*1024*1024){

alert("Image must be smaller than 2MB");
return;

}

statusMsg.innerHTML="Uploading image <span class='spinner'></span>";

let imageRef=ref(storage,"articles/"+Date.now()+"-"+file.name);

await uploadBytes(imageRef,file);

let url=await getDownloadURL(imageRef);

let alt=document.getElementById("imgAlt").value;

document.execCommand(
"insertHTML",
false,
`<img src="${url}" alt="${alt}" style="max-width:100%;border-radius:10px;margin:10px 0">`
);

statusMsg.innerText="";

}

input.click();

}

/* CLEAN HTML */

function clean(html){

return html
.replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi,"")
.replace(/\s+/g," ")
.trim();

}

/* PREVIEW */

window.preview=function(){

let title=document.getElementById("title").value;
let content=document.getElementById("editor").innerHTML;

previewBox.innerHTML=`<h2>${title}</h2><hr>${content}`;
previewBox.style.display="block";

}

/* PUBLISH */

window.publish=async function(){

let btn=document.getElementById("publishBtn");

let title=document.getElementById("title").value.trim();
let content=clean(editor.innerHTML);

let metaTitle=metaTitle.value.trim();
let metaDesc=metaDesc.value.trim();

let tags=document.getElementById("tags").value.split(",");
tags=tags.map(t=>t.trim()).filter(t=>t);

if(!title){

statusMsg.innerText="❌ Title required";
return;

}

let slug=title
.toLowerCase()
.replace(/[^\w ]+/g,"")
.replace(/ +/g,"-");

btn.disabled=true;
btn.innerHTML="<span class='spinner'></span> Publishing";

try{

await addDoc(collection(db,"articles"),{

title:title,
slug:slug,
content:content,
metaTitle:metaTitle,
metaDesc:metaDesc,
tags:tags,
date:new Date().toISOString(),
views:0,
likes:0

});

statusMsg.innerText="✅ Article Published";

document.getElementById("title").value="";
document.getElementById("editor").innerHTML="<p><b>Start writing your article...</b></p>";
document.getElementById("tags").value="";
document.getElementById("metaTitle").value="";
document.getElementById("metaDesc").value="";

}catch(e){

statusMsg.innerText="❌ Publishing failed";

}

btn.disabled=false;
btn.innerText="Publish Article";

}

/* SEO PREVIEW */

document.getElementById("metaTitle").oninput=updateSEO;
document.getElementById("metaDesc").oninput=updateSEO;

function updateSEO(){

let title=metaTitle.value;
let desc=metaDesc.value;

seoPreview.innerHTML=

`<h3>${title}</h3>
<p>${desc}</p>
<small>chahatorganic.com</small>`;

}

</script>

</body>
</html>

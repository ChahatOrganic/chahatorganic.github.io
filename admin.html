<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chahat Organic Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- QUILL -->
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

<!-- DOMPURIFY -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

<!-- TOAST -->
<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

<style>
body{font-family:Poppins;background:#f4f7f4;margin:0;}

header{background:#0f3d2e;color:#fff;padding:20px;text-align:center;}
nav a{color:white;margin:0 10px;text-decoration:none;font-weight:500;}

.container{max-width:1000px;margin:auto;padding:20px;}

input,textarea{
width:100%;padding:12px;margin-top:10px;
border-radius:10px;border:1px solid #ccc;
}

#editor{background:#fff;border-radius:10px;margin-top:10px;height:400px;}

button{
padding:10px 20px;background:#1b5e20;color:#fff;
border:none;border-radius:25px;margin-top:10px;cursor:pointer;
}

.logout{background:#b71c1c;float:right;}

.articleItem{
border-bottom:1px solid #eee;padding:15px 0;
display:flex;justify-content:space-between;flex-wrap:wrap;
}

.footer{
background:#111;color:#eee;text-align:center;padding:25px;margin-top:40px;
}
</style>
</head>

<body>

<header>
<h2>🌿 Chahat Organic Admin Dashboard</h2>
<nav>
<a href="index.html">Home</a>
<a href="articles.html">Articles</a>
<a href="contact.html">Contact</a>
<a href="https://instagram.com/chahatorganic" target="_blank">Instagram</a>
</nav>
</header>

<!-- LOGIN -->
<div id="loginBox" class="container">
<h3>🔐 Admin Login</h3>
<input id="emailInput" placeholder="Email">
<input id="passwordInput" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginMsg" style="color:red;"></p>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="container" style="display:none">

<button class="logout" onclick="logout()">Logout</button>

<h3>✍️ New / Edit Article</h3>

<input id="title" placeholder="Article Title">
<p id="slugPreview"></p>

<input id="metaTitleInput" placeholder="SEO Meta Title">
<textarea id="metaDescInput" placeholder="SEO Meta Description"></textarea>

<input type="file" id="imageUpload">
<div id="imagePreview"></div>

<div id="editor"></div>

<p>Words: <span id="wordCount">0</span></p>

<button onclick="preview()">👁️ Preview</button>
<button onclick="publish()">🚀 Publish / Update</button>

<div id="previewBox"></div>

<h3>📄 Articles (<span id="count">0</span>)</h3>
<input id="searchInput" placeholder="Search...">
<div id="articlesList">Loading...</div>

</div>

<div class="footer">
<p><b>Founder:</b> Shubham Mishra</p>
<p>Chahat Organic – Pure • Honest • Farmer Sourced</p>
<p>Email: ChahatOrganic@gmail.com | WhatsApp: 7053053863</p>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>

const config={
apiKey:"AIzaSyDzdiSsRnH3NHbaqVT5PYEZHe7eqE6Gb0A",
authDomain:"chahatorganic-ca1a1.firebaseapp.com",
projectId:"chahatorganic-ca1a1",
storageBucket:"chahatorganic-ca1a1.appspot.com"
};

firebase.initializeApp(config);

const auth=firebase.auth();
const db=firebase.firestore();
const storage=firebase.storage();

let editingId=null;
let imageUrl=null;

/* QUILL */
let quill=new Quill('#editor',{theme:'snow'});

/* WORD COUNT */
quill.on('text-change',()=>{
document.getElementById('wordCount').innerText=quill.getText().trim().split(/\s+/).length;
});

/* TOAST */
function toast(msg){
Toastify({
text:msg,
duration:3000,
gravity:"bottom",
position:"center",
backgroundColor:"#1b5e20"
}).showToast();
}

/* AUTH */
auth.onAuthStateChanged(user=>{
if(user){
loginBox.style.display="none";
adminPanel.style.display="block";
loadArticles();
}
});

function login(){
auth.signInWithEmailAndPassword(emailInput.value,passwordInput.value)
.catch(e=>loginMsg.innerText=e.message);
}

function logout(){
auth.signOut();
}

/* IMAGE */
imageUpload.onchange=async(e)=>{
let file=e.target.files[0];
let ref=storage.ref("articles/"+Date.now());
await ref.put(file);
imageUrl=await ref.getDownloadURL();
imagePreview.innerHTML=`<img src="${imageUrl}" style="max-width:150px">`;
toast("Image uploaded");
};

/* SLUG */
title.oninput=()=>{
let slug=title.value.toLowerCase().replace(/[^a-z0-9]+/g,'-');
slugPreview.innerText="Slug: "+slug;
};

/* VALIDATE */
function validate(title,content){
if(!title.trim()) return toast("Title required"),false;
if(!content.trim()) return toast("Content required"),false;
return true;
}

/* PREVIEW */
function preview(){
previewBox.innerHTML=
(imageUrl?`<img src="${imageUrl}" style="max-width:100%">`:'')+
`<h2>${title.value}</h2>`+
quill.root.innerHTML;
}

/* PUBLISH (OLD + NEW SUPPORT) */
async function publish(){

let clean=DOMPurify.sanitize(quill.root.innerHTML);
if(!validate(title.value,clean)) return;

let data={
title:title.value,
content:clean,
slug:title.value.toLowerCase().replace(/[^a-z0-9]+/g,'-'),
metaTitle:metaTitleInput.value,
metaDesc:metaDescInput.value,
imageUrl:imageUrl||"",
publishAt:new Date(),

/* OLD SUPPORT */
date:new Date().toLocaleDateString("en-IN"),
views:0,
likes:0,
tags:[]
};

if(editingId){
await db.collection("articles").doc(editingId).update(data);
toast("Updated ✅");
editingId=null;
}else{
await db.collection("articles").add(data);
toast("Published 🚀");
}

reset();
loadArticles();
}

/* RESET */
function reset(){
title.value="";
metaTitleInput.value="";
metaDescInput.value="";
quill.setText("");
imagePreview.innerHTML="";
imageUrl=null;
editingId=null;
}

/* LOAD (VERY IMPORTANT FIX) */
async function loadArticles(){

let snap=await db.collection("articles").get();

articlesList.innerHTML="";
let count=0;

snap.forEach(doc=>{
let a=doc.data(); count++;

let date = a.date || (a.publishAt?.toDate ? a.publishAt.toDate().toLocaleDateString() : "Now");

articlesList.innerHTML+=`
<div class="articleItem">
<div>
<b>${a.title}</b><br>
<small>${date} | ${a.views||0} views</small>
</div>
<div>
<button onclick="editArticle('${doc.id}')">Edit</button>
<button onclick="deleteArticle('${doc.id}')">Delete</button>
</div>
</div>`;
});

document.getElementById("count").innerText=count;
}

/* EDIT (FIXED) */
async function editArticle(id){

let docSnap=await db.collection("articles").doc(id).get();
let a=docSnap.data();

editingId=id;

title.value=a.title||"";
metaTitleInput.value=a.metaTitle||"";
metaDescInput.value=a.metaDesc||"";
quill.root.innerHTML=a.content||"";

imageUrl=a.imageUrl||null;

if(imageUrl){
imagePreview.innerHTML=`<img src="${imageUrl}" style="max-width:150px">`;
}

window.scrollTo({top:0,behavior:"smooth"});
}

/* DELETE */
function deleteArticle(id){
if(!confirm("Delete?")) return;

db.collection("articles").doc(id).delete()
.then(()=>loadArticles());
}

/* SEARCH */
searchInput.oninput=()=>{
let q=searchInput.value.toLowerCase();
document.querySelectorAll(".articleItem").forEach(e=>{
e.style.display=e.innerText.toLowerCase().includes(q)?"flex":"none";
});
};

</script>

</body>
</html>

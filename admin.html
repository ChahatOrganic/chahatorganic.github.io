<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chahat Organic – Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
:root{--green:#1b5e20}
body{margin:0;font-family:Arial;background:#f4f7f4}

/* Header */
header{background:var(--green);color:#fff;padding:16px;text-align:center}

/* Login */
.login{
  max-width:380px;margin:80px auto;background:#fff;
  padding:25px;border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.1)
}
.login h2{text-align:center;color:var(--green)}
.login input{width:100%;padding:12px;margin-top:10px}
.login button{
  width:100%;margin-top:15px;padding:12px;
  background:var(--green);color:#fff;border:none;border-radius:20px
}

/* Admin box */
.box{
  display:none;
  max-width:900px;margin:20px auto;background:#fff;
  padding:20px;border-radius:12px
}
input{width:100%;padding:12px;margin-bottom:10px;font-size:16px}
.toolbar button{margin-right:6px;padding:6px 10px}
.editor{
  border:1px solid #ccc;min-height:220px;
  padding:12px;font-size:16px
}
.actions{margin-top:12px}
.actions button{
  padding:8px 18px;background:var(--green);color:#fff;
  border:none;border-radius:20px;margin-right:8px;cursor:pointer
}
.msg{
  margin-top:10px;
  color:var(--green);
  font-weight:600;
}
</style>
</head>

<body>

<header>
  <h2>Chahat Organic – Admin Panel</h2>
  <p>Secure • Simple • Professional</p>
</header>

<!-- LOGIN -->
<div class="login" id="loginBox">
  <h2>Admin Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div class="box" id="adminBox">

<input id="title" placeholder="Post Title / Subject">

<div class="toolbar">
  <button onclick="cmd('bold')"><b>B</b></button>
  <button onclick="cmd('italic')"><i>I</i></button>
  <button onclick="cmd('insertUnorderedList')">• List</button>
  <button onclick="addImage()">Image</button>
</div>

<div id="editor" class="editor" contenteditable>
Write your content here (email-style editor)...
</div>

<input type="datetime-local" id="schedule">

<div class="actions">
  <button onclick="publishNow()">Publish</button>
  <button onclick="schedulePost()">Schedule</button>
</div>

<div class="msg" id="statusMsg"></div>

</div>

<script>
/* ================= LOGIN ================= */
const ADMIN_USER="admin";
const ADMIN_PASS="chahat@13";

function login(){
  if(username.value===ADMIN_USER && password.value===ADMIN_PASS){
    loginBox.style.display="none";
    adminBox.style.display="block";
    sessionStorage.setItem("admin","1");
  }else{
    alert("Invalid username or password");
  }
}
if(sessionStorage.getItem("admin")==="1"){
  loginBox.style.display="none";
  adminBox.style.display="block";
}

/* ================= FIREBASE ================= */
firebase.initializeApp({
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com"
});
const db=firebase.firestore();
const storage=firebase.storage();

/* ================= EDITOR ================= */
function cmd(c){document.execCommand(c,false,null);}

/* ================= IMAGE ================= */
function addImage(){
  let i=document.createElement("input");
  i.type="file"; i.accept="image/*";
  i.onchange=async()=>{
    let f=i.files[0];
    let r=storage.ref("posts/"+Date.now()+"_"+f.name);
    await r.put(f);
    let url=await r.getDownloadURL();
    document.execCommand(
      "insertHTML",
      false,
      `<img src="${url}" style="max-width:100%;margin:10px 0;border-radius:10px">`
    );
  };
  i.click();
}

/* ================= PUBLISH ================= */
async function publishNow(){
  if(!title.value || !editor.innerHTML.trim()){
    alert("Title and content are required.");
    return;
  }
  await db.collection("posts").add({
    title:title.value,
    content:editor.innerHTML,
    publishTime:new Date()
  });
  statusMsg.innerText="✅ Post published successfully and is now live.";
  clearForm();
}

/* ================= SCHEDULE ================= */
async function schedulePost(){
  if(!schedule.value){
    alert("Please select a date and time for scheduling.");
    return;
  }
  await db.collection("posts").add({
    title:title.value,
    content:editor.innerHTML,
    publishTime:new Date(schedule.value)
  });
  statusMsg.innerText="⏰ Post scheduled successfully. It will go live automatically.";
  clearForm();
}

function clearForm(){
  title.value="";
  editor.innerHTML="";
  schedule.value="";
}
</script>

</body>
</html>

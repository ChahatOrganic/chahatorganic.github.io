<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<title>Chahat Organic | Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f7f4;
margin:0;
}

header{
background:#1b5e20;
color:white;
padding:25px;
text-align:center;
}

nav{
margin-top:10px;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.editor{
border:1px solid #ccc;
padding:15px;
min-height:220px;
border-radius:10px;
background:white;
margin-top:10px;
}

.toolbar{
margin-top:10px;
display:flex;
flex-wrap:wrap;
gap:6px;
}

.toolbar button{
padding:8px 12px;
border-radius:6px;
border:1px solid #ccc;
background:#f3f3f3;
cursor:pointer;
}

button{
padding:12px 25px;
background:#1b5e20;
color:white;
border:none;
border-radius:25px;
margin-top:15px;
cursor:pointer;
}

.preview{
background:#444;
}

.logout{
background:#b71c1c;
float:right;
}

.msg{
margin-top:15px;
font-weight:bold;
}

.previewBox{
background:white;
padding:20px;
border-radius:10px;
border:1px solid #ccc;
margin-top:20px;
display:none;
}

.articleList{
background:white;
margin-top:25px;
padding:20px;
border-radius:10px;
}

.articleItem{
border-bottom:1px solid #eee;
padding:10px 0;
}

.spinner{
border:3px solid #eee;
border-top:3px solid #1b5e20;
border-radius:50%;
width:18px;
height:18px;
display:inline-block;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.seoPreview{
background:white;
border:1px solid #ddd;
padding:15px;
margin-top:15px;
}

</style></head><body><header><h2>Chahat Organic Admin Dashboard</h2><nav><a href="https://chahatorganic.github.io/">Home</a>
<a href="https://chahatorganic.github.io/articles.html">Articles</a>
<a href="https://chahatorganic.github.io/about.html">About</a>
<a href="https://chahatorganic.github.io/contact.html">Contact</a>
<a href="https://instagram.com/chahatorganic" target="_blank">Instagram</a>

</nav></header><div id="loginBox" class="container"><input id="emailInput" placeholder="Admin Email">
<input id="passwordInput" type="password" placeholder="Password"><button onclick="login()">Login</button>

<div class="msg" id="loginMsg"></div></div><div class="container" id="adminPanel" style="display:none"><button class="logout" onclick="logout()">Logout</button>

<input id="title" placeholder="Article Title"><input id="metaTitleInput" placeholder="SEO Meta Title">
<textarea id="metaDescInput" placeholder="SEO Meta Description"></textarea><input id="tagsInput" placeholder="Tags (example: organic food, turmeric)">
<input id="imgAltInput" placeholder="Image ALT text"><div class="toolbar"><button onclick="format('bold')"><b>B</b></button>
<button onclick="format('italic')"><i>I</i></button>
<button onclick="format('insertUnorderedList')">• List</button>
<button onclick="addImage()">🖼 Image</button>

</div><div id="editor" class="editor" contenteditable="true">
<p><b>Start writing your article...</b></p>
</div><button onclick="aiWriter()">AI Write Article</button>

<button class="preview" onclick="preview()">Preview</button>

<button onclick="saveDraft()">Save Draft</button>

<button id="publishBtn" onclick="publish()">Publish Article</button>

<div class="msg" id="statusMsg"></div><div id="previewBox" class="previewBox"></div><div class="seoPreview" id="seoPreview"></div><div class="articleList"><h3>Published Articles</h3><div id="articlesList"></div></div></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
deleteDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";


const firebaseConfig={
apiKey:"AIzaSyDzdiSsRnH3NHbaqVT5PYEZHe7eqE6Gb0A",
authDomain:"chahatorganic-ca1a1.firebaseapp.com",
projectId:"chahatorganic-ca1a1",
storageBucket:"chahatorganic-ca1a1.firebasestorage.app",
messagingSenderId:"687378359578",
appId:"1:687378359578:web:94b28c0dff9431a9e4f8a3"
};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);
const auth=getAuth(app);
const storage=getStorage(app);


onAuthStateChanged(auth,(user)=>{

if(user){

loginBox.style.display="none";
adminPanel.style.display="block";

loadArticles();

}

});


window.login=async function(){

try{

await signInWithEmailAndPassword(auth,emailInput.value,passwordInput.value);

}catch(err){

loginMsg.innerText="❌ "+err.message;

}

}

window.logout=function(){

signOut(auth);
location.reload();

}

window.format=function(cmd){

document.execCommand(cmd,false,null);

}


window.addImage=function(){

let input=document.createElement("input");

input.type="file";

input.onchange=async()=>{

let file=input.files[0];

statusMsg.innerHTML="Uploading image <span class='spinner'></span>";

let imageRef=ref(storage,"articles/"+Date.now()+"-"+file.name);

await uploadBytes(imageRef,file);

let url=await getDownloadURL(imageRef);

let alt=imgAltInput.value;

document.execCommand(
"insertHTML",
false,
`<img src="${url}" alt="${alt}" style="max-width:100%;border-radius:10px;margin:10px 0">`
);

statusMsg.innerText="";

}

input.click();

}


window.aiWriter=function(){

let topic=prompt("Enter article topic");

editor.innerHTML=`
<h2>${topic}</h2>

<p>${topic} is an important part of organic living.</p>

<h3>Benefits</h3>

<ul>
<li>Supports natural health</li>
<li>Improves immunity</li>
<li>Better digestion</li>
</ul>
`;

}


function clean(html){

return html.replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi,"").trim();

}


window.preview=function(){

previewBox.innerHTML=`<h2>${title.value}</h2><hr>${editor.innerHTML}`;

previewBox.style.display="block";

}


window.saveDraft=async function(){

await addDoc(collection(db,"drafts"),{

title:title.value,
content:editor.innerHTML,
date:new Date().toISOString()

});

statusMsg.innerText="Draft saved";

}


window.publish=async function(){

let btn=publishBtn;

let t=title.value.trim();

let slug=t.toLowerCase().replace(/[^\w ]+/g,"").replace(/ +/g,"-");

btn.disabled=true;

btn.innerHTML="<span class='spinner'></span> Publishing";

await addDoc(collection(db,"articles"),{

title:t,
slug,
content:clean(editor.innerHTML),
metaTitle:metaTitleInput.value,
metaDesc:metaDescInput.value,
tags:tagsInput.value.split(","),
date:new Date().toISOString(),
views:0,
likes:0

});

statusMsg.innerText="Article Published";

editor.innerHTML="<p><b>Start writing your article...</b></p>";

btn.disabled=false;

btn.innerText="Publish Article";

loadArticles();

}


async function loadArticles(){

articlesList.innerHTML="Loading...";

let snap=await getDocs(collection(db,"articles"));

articlesList.innerHTML="";

snap.forEach(docSnap=>{

let a=docSnap.data();

articlesList.innerHTML+=`

<div class="articleItem">

<b>${a.title}</b>

<br>

<button onclick="editArticle('${docSnap.id}','${a.title}')">Edit</button>

<button class="deleteBtn" onclick="deleteArticle('${docSnap.id}')">Delete</button>

</div>

`;

});

}


window.deleteArticle=async function(id){

if(!confirm("Delete article?")) return;

await deleteDoc(doc(db,"articles",id));

loadArticles();

}


window.editArticle=async function(id,title){

let newTitle=prompt("Edit title",title);

await updateDoc(doc(db,"articles",id),{

title:newTitle

});

loadArticles();

}

</script></body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chahat Organic – Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f7f4}
header{background:#1b5e20;color:#fff;padding:15px;text-align:center}
.box{max-width:900px;margin:20px auto;background:#fff;padding:20px;border-radius:12px}
input{width:100%;padding:12px;margin-bottom:10px;font-size:16px}
.toolbar button{margin-right:6px;padding:6px 10px}
.editor{border:1px solid #ccc;min-height:220px;padding:12px;font-size:16px}
.actions{margin-top:12px}
.actions button{
  padding:8px 18px;background:#1b5e20;color:#fff;
  border:none;border-radius:20px;margin-right:8px;cursor:pointer
}
</style>
</head>

<body>

<header>
  <h2>Chahat Organic – Admin Panel</h2>
  <p>Simple • Email-like Editor</p>
</header>

<div class="box">

<input id="title" placeholder="Subject / Title">

<div class="toolbar">
  <button onclick="cmd('bold')"><b>B</b></button>
  <button onclick="cmd('italic')"><i>I</i></button>
  <button onclick="cmd('insertUnorderedList')">• List</button>
  <button onclick="addImage()">Image</button>
</div>

<div id="editor" class="editor" contenteditable>
Write your message here (email jaisa)...
</div>

<input type="datetime-local" id="schedule">

<div class="actions">
  <button onclick="publishNow()">Publish</button>
  <button onclick="schedulePost()">Schedule</button>
</div>

</div>

<script>
/* ===== FIREBASE CONFIG (APNA REAL DATA DALO) ===== */
firebase.initializeApp({
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com"
});
const db = firebase.firestore();
const storage = firebase.storage();

/* ===== EDITOR ===== */
function cmd(c){ document.execCommand(c,false,null); }

/* ===== IMAGE ADD ===== */
function addImage(){
  let i=document.createElement("input");
  i.type="file"; i.accept="image/*";
  i.onchange=async()=>{
    let f=i.files[0];
    let r=storage.ref("posts/"+Date.now()+"_"+f.name);
    await r.put(f);
    let url=await r.getDownloadURL();
    document.execCommand(
      "insertHTML",
      false,
      `<img src="${url}" style="max-width:100%;margin:10px 0;border-radius:10px">`
    );
  };
  i.click();
}

/* ===== PUBLISH NOW ===== */
async function publishNow(){
  if(!title.value || !editor.innerHTML.trim()){
    alert("Title aur content zaroori hai");
    return;
  }
  await db.collection("posts").add({
    title:title.value,
    content:editor.innerHTML,
    publishTime:new Date()
  });
  alert("Publish ho gaya ✅");
  title.value=""; editor.innerHTML=""; schedule.value="";
}

/* ===== SCHEDULE ===== */
async function schedulePost(){
  if(!schedule.value){
    alert("Date & time select karo");
    return;
  }
  await db.collection("posts").add({
    title:title.value,
    content:editor.innerHTML,
    publishTime:new Date(schedule.value)
  });
  alert("Schedule ho gaya ✅");
  title.value=""; editor.innerHTML=""; schedule.value="";
}
</script>

</body>
</html>

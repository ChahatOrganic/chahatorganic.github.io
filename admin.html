<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Chahat Organic Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Poppins,Arial;
background:#f4f7f4;
margin:0;
color:#000;
}

/* HEADER */
header{
background:#0f3d2e;
color:#fff;
padding:25px;
text-align:center;
}

nav{
margin-top:10px;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
font-weight:500;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* INPUT */
input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
background:#fff;
color:#000;
}

/* EDITOR */
.editor{
border:1px solid #ccc;
padding:15px;
min-height:400px;
border-radius:10px;
background:white;
margin-top:10px;
color:#000;
}

/* BUTTON */
button{
padding:12px 25px;
background:#1b5e20;
color:white;
border:none;
border-radius:30px;
margin-top:10px;
cursor:pointer;
}

button:hover{opacity:.9;}

.logout{
background:#b71c1c;
float:right;
}

/* TOOLBAR */
.toolbar{
margin-top:10px;
display:flex;
gap:6px;
flex-wrap:wrap;
}

.toolbar button{
padding:8px 12px;
background:#eee;
color:#000;
}

/* BOX */
.previewBox,.seoPreview{
background:white;
padding:15px;
border-radius:10px;
margin-top:15px;
}

/* ARTICLES */
.articleList{
background:white;
margin-top:20px;
padding:15px;
border-radius:10px;
}

.articleItem{
border-bottom:1px solid #eee;
padding:10px 0;
}

/* FOOTER */
.footer{
background:#111;
color:#eee;
text-align:center;
padding:30px;
margin-top:40px;
}

.msg{
margin-top:10px;
font-weight:600;
}

</style>

</head>

<body>

<header>

<h2>Chahat Organic Admin Dashboard</h2>

<nav>
<a href="index.html">Home</a>
<a href="articles.html">Articles</a>
<a href="founder.html">Founder</a>
<a href="contact.html">Contact</a>
<a href="https://instagram.com/chahatorganic" target="_blank">Instagram</a>
</nav>

</header>

<!-- LOGIN -->
<div id="loginBox" class="container">

<input id="emailInput" placeholder="Admin Email">
<input id="passwordInput" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<div class="msg" id="loginMsg"></div>

</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="container" style="display:none">

<button class="logout" onclick="logout()">Logout</button>

<input id="title" placeholder="Article Title">
<p id="slugPreview"></p>

<input id="metaTitleInput" placeholder="SEO Meta Title">
<textarea id="metaDescInput" placeholder="SEO Meta Description"></textarea>

<input id="tagsInput" placeholder="Tags (comma separated)">
<input id="imgAltInput" placeholder="Image ALT text">

<div class="toolbar">
<button onclick="format('bold')"><b>B</b></button>
<button onclick="format('italic')"><i>I</i></button>
<button onclick="format('insertUnorderedList')">• List</button>
<button onclick="addImage()">🖼 Image</button>
</div>

<div id="editor" class="editor" contenteditable="true">
Start writing your article...
</div>

<p id="wordStats"></p>

<button onclick="aiWriter()">AI Write Article</button>
<button onclick="preview()">Preview</button>
<button onclick="saveDraft()">Save Draft</button>
<button onclick="publish()">Publish Article</button>

<div class="msg" id="statusMsg"></div>

<div id="previewBox" class="previewBox"></div>
<div id="seoPreview" class="seoPreview"></div>

<input id="searchInput" placeholder="Search articles">

<div class="articleList">
<h3>Published Articles</h3>
<div id="articlesList"></div>
</div>

</div>

<!-- FOOTER -->
<div class="footer">

<p><b>Founder:</b> Shubham Mishra</p>
<p>Chahat Organic – Pure • Honest • Farmer Sourced</p>

<p>Email: ChahatOrganic@gmail.com</p>
<p>WhatsApp: 7053053863</p>

<p>Instagram: @ChahatOrganic</p>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyDzdiSsRnH3NHbaqVT5PYEZHe7eqE6Gb0A",
authDomain:"chahatorganic-ca1a1.firebaseapp.com",
projectId:"chahatorganic-ca1a1",
storageBucket:"chahatorganic-ca1a1.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();
const storage=firebase.storage();

let editingId=null;

/* AUTO LOGIN FIX */
auth.onAuthStateChanged(user=>{
if(user){
loginBox.style.display="none";
adminPanel.style.display="block";
loadArticles();
}
});

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(emailInput.value,passwordInput.value)
.catch(err=>{
loginMsg.innerText="❌ "+err.message;
});
}

/* LOGOUT */
function logout(){
auth.signOut();
}

/* FORMAT */
function format(cmd){
document.execCommand(cmd,false,null);
}

/* IMAGE */
function addImage(){

if(!imgAltInput.value){
alert("Please enter ALT text");
return;
}

let input=document.createElement("input");
input.type="file";

input.onchange=async()=>{
let file=input.files[0];

let ref=storage.ref("articles/"+Date.now()+"-"+file.name);

await ref.put(file);
let url=await ref.getDownloadURL();

document.execCommand("insertHTML",false,
`<img src="${url}" alt="${imgAltInput.value}" style="max-width:100%;border-radius:10px">`);
};

input.click();
}

/* AI WRITER */
function aiWriter(){
let topic=prompt("Enter topic");

editor.innerHTML=`
<h2>${topic}</h2>
<p>${topic} is important for organic lifestyle.</p>
<ul>
<li>Improves health</li>
<li>Boosts immunity</li>
<li>Supports natural living</li>
</ul>`;
}

/* SLUG */
title.oninput=()=>{
let slug=title.value.toLowerCase().replace(/\s+/g,"-");
slugPreview.innerText="Slug: "+slug;
};

/* SEO PREVIEW */
metaTitleInput.oninput=metaDescInput.oninput=()=>{
seoPreview.innerHTML=
`<h3>${metaTitleInput.value}</h3><p>${metaDescInput.value}</p>`;
};

/* WORD COUNT */
editor.oninput=()=>{
let words=editor.innerText.split(/\s+/).length;
let time=Math.ceil(words/200);
wordStats.innerText=`Words: ${words} | ${time} min read`;
};

/* AUTO SAVE */
setInterval(()=>{
if(editor.innerText.trim()){
db.collection("drafts").add({
content:editor.innerHTML,
date:new Date()
});
}
},30000);

/* PREVIEW */
function preview(){
previewBox.innerHTML=`<h2>${title.value}</h2><hr>${editor.innerHTML}`;
}

/* SAVE DRAFT */
function saveDraft(){
db.collection("drafts").add({
title:title.value,
content:editor.innerHTML,
date:new Date()
});
statusMsg.innerText="Draft saved";
}

/* PUBLISH */
function publish(){

let content=editor.innerHTML + `
<div style="text-align:center;margin-top:20px">
<a href="index.html">Explore Organic Products</a>
</div>`;

db.collection("articles").add({
title:title.value,
slug:title.value.toLowerCase().replace(/\s+/g,"-"),
content:content,
metaTitle:metaTitleInput.value,
metaDesc:metaDescInput.value,
tags:tagsInput.value.split(","),
date:new Date().toLocaleDateString("en-IN"),
views:0,
likes:0
})
.then(()=>{
statusMsg.innerText="✅ Published";
loadArticles();
});
}

/* LOAD */
function loadArticles(){
articlesList.innerHTML="Loading...";

db.collection("articles").get().then(snap=>{
articlesList.innerHTML="";

snap.forEach(doc=>{
let a=doc.data();

articlesList.innerHTML+=`
<div class="articleItem">
<b>${a.title}</b> (${a.views||0} views)<br>
<button onclick="deleteArticle('${doc.id}')">Delete</button>
</div>`;
});
});
}

/* DELETE */
function deleteArticle(id){
if(!confirm("Delete?")) return;

db.collection("articles").doc(id).delete().then(loadArticles);
}

/* SEARCH */
searchInput.oninput=()=>{
let q=searchInput.value.toLowerCase();

document.querySelectorAll(".articleItem").forEach(e=>{
e.style.display=e.innerText.toLowerCase().includes(q)?"block":"none";
});
};

</script>

</body>
</html>
